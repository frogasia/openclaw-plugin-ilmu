name: release

# Triggered when an engineer publishes a GitHub Release on https://github.com/<repo>/releases.
# Engineer flow:
#   1. Locally bump the version: `npm version <patch|minor|major>` (creates a commit + tag).
#   2. Push: `git push origin main --follow-tags`.
#   3. On GitHub: Releases → Draft new release → pick the new tag → write notes → Publish.
# This workflow then verifies the tag matches package.json and publishes to npm with provenance.

on:
  release:
    types: [published]

concurrency: release-${{ github.event.release.tag_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Verify tarball ships compiled runtime entry
        run: ./scripts/verify-tarball.sh
      - name: Verify package.json version matches release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  verify-install:
    # Post-publish sanity check: simulate a real user installing the just-published
    # plugin via the OpenClaw CLI, on a fresh runner with no repo checkout.
    # If this fails, the published artifact is broken — patch the bug, bump version,
    # and re-release.
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Install OpenClaw CLI
        run: npm install -g openclaw
      - name: Wait for npm registry propagation
        env:
          PKG: '@ytlailabs/ilmu-openclaw-plugin'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5 6 7 8; do
            if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
              echo "Found $PKG@$VERSION on registry (attempt $attempt)"
              exit 0
            fi
            echo "Not yet visible on registry, waiting 15s..."
            sleep 15
          done
          echo "::error::$PKG@$VERSION did not become visible on the npm registry within 2 minutes"
          exit 1
      - name: Install plugin via OpenClaw CLI
        env:
          PKG: '@ytlailabs/ilmu-openclaw-plugin'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          openclaw plugins install "$PKG@$VERSION"
