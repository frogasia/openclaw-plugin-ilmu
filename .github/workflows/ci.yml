name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Verify tarball ships compiled runtime entry
        run: |
          PACK_LIST=$(npm pack --dry-run --json)
          for required in dist/index.js dist/provider-discovery.js dist/templates/agents-md-block.tmpl; do
            if ! echo "$PACK_LIST" | grep -q "\"$required\""; then
              echo "::error::publishable tarball is missing $required"
              echo "$PACK_LIST"
              exit 1
            fi
          done
